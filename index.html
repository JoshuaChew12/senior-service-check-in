<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- PRECONNECT (GAS OPTIMIZATION) -->
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.gstatic.com">
<link rel="dns-prefetch" href="https://script.google.com">
<link rel="dns-prefetch" href="https://script.gstatic.com">

<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:24px;
}

button{
  padding:16px;
  margin:10px;
  font-size:20px;
}

input{
  padding:14px;
  font-size:20px;
  width:220px;
}

#scanner{
  width:320px;
  margin:auto;
}

.success{
  background:#d4edda;
}

.duplicate{
  background:#fff3cd;
}

.error{
  background:#f8d7da;
}

.loginBox{
  margin-top:50px;
}

</style>

</head>

<body>

<h2>乐临聚会报到系统</h2>
<h3>Senior Service Check-in</h3>

<h4>
Checked-in:
<span id="count">0</span>
</h4>

<!-- ===================================== -->
<!-- LOGIN PAGE -->
<!-- ===================================== -->

<div id="loginPage" class="loginBox">

  <h3>Staff Login</h3>

  <input
    id="username"
    placeholder="Username"
    autocomplete="off"
  >

  <br><br>

  <input
    id="password"
    type="password"
    placeholder="Password"
    onkeypress="if(event.key==='Enter')login()"
  >

  <br><br>

  <button onclick="login()">
    Login
  </button>

  <br><br>

  <div
    id="loginError"
    style="
      color:red;
      font-size:18px;
    ">
  </div>

</div>

<!-- ===================================== -->
<!-- HOME -->
<!-- ===================================== -->

<div id="home" style="display:none;">

<button onclick="openScan()">
📷 Scan QR
</button>

<button onclick="openManual()">
⌨️ Manual Input
</button>

<button onclick="openDashboard()">
📊 Dashboard
</button>

<br>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<!-- ===================================== -->
<!-- SCAN -->
<!-- ===================================== -->

<div id="scanPage" style="display:none;">

<h4>Scan QR Code</h4>

<div id="scanner"></div>

<button onclick="goHome()">
⬅️ Back
</button>

</div>

<!-- ===================================== -->
<!-- MANUAL -->
<!-- ===================================== -->

<div id="manualPage" style="display:none;">

<h4>Manual Check-in</h4>

<input
id="idInput"
placeholder="Enter ID"
onkeypress="if(event.key==='Enter')manualCheck()"
>

<br><br>

<button onclick="manualCheck()">
Check-in
</button>

<br>

<button onclick="goHome()">
⬅️ Back
</button>

</div>

<div id="dashboardPage" style="display:none;">

<h3>📊 Dashboard</h3>

<div>Total: <span id="d_total">-</span></div>
<div>Checked In: <span id="d_checked">-</span></div>
<div>Pending: <span id="d_pending">-</span></div>
<div>Group A: <span id="d_a">-</span></div>
<div>Group B: <span id="d_b">-</span></div>

<br>

<button onclick="goHome()">
⬅️ Home
</button>

</div>

<!-- ===================================== -->
<!-- RESULT -->
<!-- ===================================== -->

<div id="resultPage" style="display:none;">

<div id="resultContent"></div>

<br><br>

<button onclick="nextAction()">
Submit Another
</button>

<button onclick="goHome()">
Home
</button>

</div>

<script>

// =====================================
// CONFIG
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbyF7v7Kzddzb32-s4LJSN4NsseNcZqrLsXeTWVuuBpq5pMpMZFfEiTqFtmlfbRfUXeOpQ/exec";

// =====================================
// FIREBASE
// =====================================

firebase.initializeApp({

  databaseURL:
  "https://senior-service-check-in-default-rtdb.asia-southeast1.firebasedatabase.app/"

});

const db = firebase.database();

// realtime counter

db.ref("count").on("value", snap => {

  document.getElementById("count")
    .innerText = snap.val() || 0;

});

// =====================================
// GLOBALS
// =====================================

let scanner = null;
let scannerStarted = false;
let currentMode = "";
let scanCooldown = false;
let idleTimer = null;

const IDLE_LIMIT = 10 * 60 * 1000;

// =====================================
// PRELOAD BEEP
// =====================================

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

beep.preload = "auto";

// =====================================
// APP START
// =====================================

window.addEventListener("load", () => {

  smartWarmup("page_load");
  
  ["click","touchstart","keypress"].forEach(event => {

  document.addEventListener(event, () => {

    if (
      sessionStorage.getItem("auth") === "true"
    ) {
      resetIdleTimer();
    }

  });

});
  
  // =====================================
  // LOGIN CHECK
  // =====================================

  const auth =
    sessionStorage.getItem("auth");

  if (auth === "true") {

    showApp();

  } else {

    showLoginPage();

  }

});

// =====================================
// LOGIN
// =====================================

function login() {

  smartWarmup("login_fallback");
  
  const username =
    document.getElementById("username")
      .value
      .trim();

  const password =
    document.getElementById("password")
      .value
      .trim();

  // =====================================
  // EMPTY CHECK
  // =====================================

  if (!username || !password) {

    document.getElementById("loginError")
      .innerText =
      "Enter username and password";

    return;

  }

  // =====================================
  // LOADING
  // =====================================

  showLoginLoading();

  // =====================================
  // TIMEOUT PROTECTION
  // =====================================

  const controller =
    new AbortController();

  const timeout =
    setTimeout(() => {

      controller.abort();

    }, 20000);

  // =====================================
  // LOGIN REQUEST
  // =====================================

  fetch(

    API_URL +

    "?action=login" +

    "&username=" +
    encodeURIComponent(username) +

    "&password=" +
    encodeURIComponent(password),

    {

      signal: controller.signal,

      cache: "no-store",

      keepalive: true

    }

  )

  .then(r => r.json())

  .then(data => {

    // =====================================
    // SUCCESS
    // =====================================

    if (data.success) {

      sessionStorage.setItem(
        "auth",
        "true"
      );

      sessionStorage.setItem(
        "username",
        data.username
      );

      sessionStorage.setItem(
        "role",
        data.role
      );

      resetIdleTimer();

      showApp();

      return;

    }

    // =====================================
    // INVALID LOGIN
    // =====================================

    document.getElementById("loginError")
      .innerText =
      "Invalid username or password";

    showLoginPage();

  })

  // =====================================
  // NETWORK ERROR / TIMEOUT
  // =====================================

  .catch(err => {

    // timeout
    if (err.name === "AbortError") {

      document.getElementById("loginError")
        .innerText =
        "Login timeout";

      showLoginPage();

      return;

    }

    // other network errors
    document.getElementById("loginError")
      .innerText =
      "Network error";

    showLoginPage();

  })

  // =====================================
  // CLEAR TIMER
  // =====================================

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// LOGOUT
// =====================================

function logout() {

  sessionStorage.clear();

  goHome();

  hideAll();

  showLoginPage();

}

function resetIdleTimer() {

  clearTimeout(idleTimer);

  idleTimer = setTimeout(() => {

    alert("Session expired");

    logout();

  }, IDLE_LIMIT);

}

// =====================================
// SHOW APP
// =====================================

function showApp() {

  hideAll();

  document.getElementById("home")
    .style.display = "block";

}

// =====================================
// SHOW LOGIN PAGE
// =====================================

function showLoginPage() {

  hideAll();

  document.getElementById("loginPage")
    .style.display = "block";

  // reset UI state
  document.getElementById("loginError")
    .innerHTML = "";

  document.getElementById("username").value = "";
  document.getElementById("password").value = "";

}

// =====================================
// LOGIN LOADING
// =====================================

function showLoginLoading() {

  document.getElementById("loginError")
    .innerHTML =
    "⏳ Logging in...";

}



// =====================================
// API CALL
// =====================================

function callAPI(id) {

  showLoading();

  const controller = new AbortController();

  const timeout = setTimeout(() => {

    controller.abort();

  }, 20000);

  fetch(

    API_URL + "?id=" +
    encodeURIComponent(id),

    {
      signal: controller.signal,
      cache: "no-store",
      keepalive: true
    }

  )

  .then(r => r.json())

  .then(data => {

    handleResult(data);

  })

  .catch(() => {

    handleResult({

      type: "error",

      message:
      "Network error / timeout"

    });

  })

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// OPEN SCAN
// =====================================

async function openScan() {

  currentMode = "scan";

  hideAll();

  document.getElementById("scanPage")
    .style.display = "block";

  // =====================================
  // CREATE SCANNER ONCE
  // =====================================

  if (!scanner) {

    scanner = new Html5Qrcode("scanner");

  }

  // =====================================
  // IF ALREADY STARTED
  // JUST RESUME
  // =====================================

  if (scannerStarted) {

    try {

      await scanner.resume();

      scanCooldown = false;

    } catch (err) {

      console.log(err);

    }

    return;

  }

  // =====================================
  // FIRST START
  // =====================================

  try {

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps: 15,
        qrbox: 250,
        aspectRatio: 1
      },

      onScanSuccess

    );

    scannerStarted = true;

    scanCooldown = false;

  } catch (err) {

    alert("Camera failed");

    console.log(err);

  }

}

// =====================================
// SCAN SUCCESS
// =====================================

async function onScanSuccess(text) {

  if (scanCooldown) return;

  scanCooldown = true;

  if (navigator.vibrate) {

    navigator.vibrate(80);

  }

  await scanner.pause(true);

  callAPI(text);

}

// =====================================
// MANUAL
// =====================================

function openManual() {

  currentMode = "manual";

  hideAll();

  document.getElementById("manualPage")
    .style.display = "block";

  const input =
    document.getElementById("idInput");

  input.value = "";

  input.focus();

}

function manualCheck() {

  const id =
    document.getElementById("idInput")
      .value
      .trim();

  if (!id) return;

  callAPI(id);

}

// =====================================
// HANDLE RESULT
// =====================================

function handleResult(data) {

  resetIdleTimer();
  
  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  let html = "";

  // =====================================
  // SUCCESS
  // =====================================

  if (data.type === "success") {

    page.className = "success";

    html = `

      <div style="
      font-size:70px;
      color:green;
      font-weight:bold;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:30px;
      ">
        Checked In
      </div>

      <div style="
      font-size:26px;
      ">
        ${data.time}
      </div>

    `;

    beep.currentTime = 0;

    beep.play();

    db.ref("count")
      .transaction(v => (v || 0) + 1);

  }

  // =====================================
  // DUPLICATE
  // =====================================

  else if (data.type === "duplicate") {

    page.className = "duplicate";

    html = `

      <div style="
      font-size:50px;
      color:orange;
      ">
        Already Checked In
      </div>

      <br>

      <div style="
      font-size:60px;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:28px;
      ">
        Check-in Time
      </div>

      <div style="
      font-size:32px;
      ">
        ${data.time}
      </div>

    `;

  }

  // =====================================
  // ERROR
  // =====================================

  else {

    page.className = "error";

    html = `

      <div style="
      font-size:50px;
      color:red;
      ">
        ${data.message}
      </div>

    `;

  }

  document.getElementById("resultContent")
    .innerHTML = html;

}

// =====================================
// NEXT ACTION
// =====================================

async function nextAction() {

  if (currentMode === "scan") {

    hideAll();

    document.getElementById("scanPage")
      .style.display = "block";

    scanCooldown = false;

    if (scanner) {

      await scanner.resume();

    }

    return;

  }

  openManual();

}

// =====================================
// HOME
// =====================================

async function goHome() {

  hideAll();

  document.getElementById("home")
    .style.display = "block";

  scanCooldown = false;

  if (scanner && scannerStarted) {

    try {

      await scanner.pause(true);

    } catch(e){}

  }

}

// =====================================
// LOADING
// =====================================

function showLoading() {

  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  page.className = "";

  document.getElementById("resultContent")
    .innerHTML = `

      <div style="
      font-size:40px;
      ">
        ⏳ Checking...
      </div>

    `;

}

// =====================================
// HIDE ALL
// =====================================

function hideAll() {

  document.getElementById("loginPage")
    .style.display = "none";

  document.getElementById("home")
    .style.display = "none";

  document.getElementById("scanPage")
    .style.display = "none";

  document.getElementById("manualPage")
    .style.display = "none";

  document.getElementById("dashboardPage")
    .style.display = "none";
  
  document.getElementById("resultPage")
    .style.display = "none";

}

// ============================
// SMART WARMUP SYSTEM
// ============================

const WARMUP_KEY = "gas_warmup_last";
const WARMUP_COOLDOWN = 5 * 60 * 1000; // 5 min

function shouldWarmup() {

  const last = Number(localStorage.getItem(WARMUP_KEY) || "0");

  return Date.now() - last > WARMUP_COOLDOWN;
}

function smartWarmup(reason = "unknown") {

  if (!shouldWarmup()) return;

  fetch(API_URL + "?action=warmup&type=smart&reason=" + reason, {
    method: "GET",
    keepalive: true,
    cache: "no-store",
    mode: "no-cors"
  }).catch(() => {});

  localStorage.setItem(WARMUP_KEY, Date.now().toString());

  console.log("🔥 warmup:", reason);
}

// ============================
// DASHBOARD API
// ============================

function loadDashboard() {

  fetch(API_URL + "?action=dashboard", {
    cache: "no-store"
  })
  .then(r => r.json())
  .then(d => {

    document.getElementById("d_total").innerText = d.total || 0;
    document.getElementById("d_checked").innerText = d.checked || 0;
    document.getElementById("d_pending").innerText = d.pending || 0;
    document.getElementById("d_a").innerText = d.a || 0;
    document.getElementById("d_b").innerText = d.b || 0;

  })
  .catch(() => {});

}

function openDashboard() {

  hideAll();

  document.getElementById("dashboardPage")
    .style.display = "block";

  loadDashboard(); // 进来就刷新一次

}

</script>

</body>
</html>
