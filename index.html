<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- PRECONNECT -->
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.gstatic.com">
<link rel="dns-prefetch" href="https://script.google.com">
<link rel="dns-prefetch" href="https://script.gstatic.com">

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

button{
  padding:16px;
  margin:10px;
  font-size:18px;
}

input{
  padding:14px;
  font-size:18px;
  width:220px;
}

#scanner{
  width:320px;
  margin:auto;
}

.success{ background:#d4edda; }
.duplicate{ background:#fff3cd; }
.error{ background:#f8d7da; }

.loginBox{ margin-top:50px; }

</style>

</head>

<body>

<h2>乐临聚会报到系统</h2>
<h3>Senior Service Check-in</h3>

<h4>Checked-in: <span id="count">0</span></h4>

<!-- ================= LOGIN ================= -->
<div id="loginPage" class="loginBox">

  <h3>Staff Login</h3>

  <input id="username" placeholder="Username" autocomplete="off">
  <br><br>

  <input id="password" type="password"
    placeholder="Password"
    onkeypress="if(event.key==='Enter') login()">

  <br><br>

  <button onclick="login()">Login</button>

  <br><br>

  <div id="loginError" style="color:red;font-size:18px;"></div>

</div>

<!-- ================= HOME ================= -->
<div id="home" style="display:none;">

  <button onclick="openScan()">📷 Scan QR</button>
  <button onclick="openManual()">⌨️ Manual Input</button>

  <br>

  <button onclick="logout()">🚪 Logout</button>

</div>

<!-- ================= SCAN ================= -->
<div id="scanPage" style="display:none;">
  <h4>Scan QR Code</h4>
  <div id="scanner"></div>
  <button onclick="goHome()">⬅️ Back</button>
</div>

<!-- ================= MANUAL ================= -->
<div id="manualPage" style="display:none;">
  <h4>Manual Check-in</h4>

  <input id="idInput"
    placeholder="Enter ID"
    onkeypress="if(event.key==='Enter') manualCheck()">

  <br><br>

  <button onclick="manualCheck()">Check-in</button>
  <br>
  <button onclick="goHome()">⬅️ Back</button>

</div>

<!-- ================= RESULT ================= -->
<div id="resultPage" style="display:none;">
  <div id="resultContent"></div>
  <br><br>
  <button onclick="nextAction()">Submit Another</button>
  <button onclick="goHome()">Home</button>
</div>

<script>

// ================= CONFIG =================
const API_URL =
"https://script.google.com/macros/s/AKfycbyF7v7Kzddzb32-s4LJSN4NsseNcZqrLsXeTWVuuBpq5pMpMZFfEiTqFtmlfbRfUXeOpQ/exec";

// ================= FIREBASE =================
firebase.initializeApp({
  databaseURL:
  "https://senior-service-check-in-default-rtdb.asia-southeast1.firebasedatabase.app/"
});

const db = firebase.database();

db.ref("count").on("value", snap => {
  document.getElementById("count").innerText = snap.val() || 0;
});

// ================= STATE =================
let scanner = null;
let scannerStarted = false;
let currentMode = "";
let scanCooldown = false;

let warmed = {
  login: false,
  checkin: false
};

// ================= SOUND =================
const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

// ================= SMART WARMUP =================
function warmup(type="full") {

  if (type === "login" && warmed.login) return;
  if (type === "checkin" && warmed.checkin) return;

  if (type === "login") warmed.login = true;
  if (type === "checkin") warmed.checkin = true;

  fetch(API_URL + "?action=warmup&type=" + type, {
    cache: "no-store",
    keepalive: true
  }).catch(() => {});
}

// ================= LOGIN =================
function login() {

  warmup("login");

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    document.getElementById("loginError").innerText =
      "Enter username and password";
    return;
  }

  showLoginLoading();

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 20000);

  fetch(
    API_URL +
    "?action=login" +
    "&username=" + encodeURIComponent(username) +
    "&password=" + encodeURIComponent(password),
    {
      signal: controller.signal,
      cache: "no-store"
    }
  )
  .then(r => r.json())
  .then(data => {

    if (data.success) {
      sessionStorage.setItem("auth","true");
      sessionStorage.setItem("username",data.username);
      sessionStorage.setItem("role",data.role);
      showApp();
      return;
    }

    document.getElementById("loginError").innerText =
      "Invalid username or password";

    showLoginPage();

  })
  .catch(err => {

    document.getElementById("loginError").innerText =
      err.name === "AbortError" ? "Login timeout" : "Network error";

    showLoginPage();

  })
  .finally(() => clearTimeout(timeout));
}

// ================= LOGOUT =================
function logout() {
  sessionStorage.clear();
  showLoginPage();
}

// ================= UI =================
function showApp(){
  hideAll();
  document.getElementById("home").style.display="block";
}

function showLoginPage(){

  hideAll();

  document.getElementById("loginPage").style.display="block";
  document.getElementById("loginError").innerHTML="";
  document.getElementById("username").value="";
  document.getElementById("password").value="";

}

function showLoginLoading(){
  document.getElementById("loginError").innerHTML="⏳ Logging in...";
}

// ================= CHECK-IN API =================
function callAPI(id){

  showLoading();

  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(),15000);

  fetch(API_URL + "?id=" + encodeURIComponent(id),{
    signal: controller.signal,
    cache:"no-store"
  })
  .then(r=>r.json())
  .then(handleResult)
  .catch(()=>handleResult({
    type:"error",
    message:"Network error"
  }))
  .finally(()=>clearTimeout(timeout));

}

// ================= SCAN =================
async function openScan(){

  warmup("checkin");

  currentMode="scan";

  hideAll();
  document.getElementById("scanPage").style.display="block";

  if(!scanner){
    scanner = new Html5Qrcode("scanner");
  }

  if(scannerStarted){

    try{
      await scanner.resume();
      scanCooldown=false;
    }catch(e){}

    return;
  }

  await scanner.start(
    {facingMode:"environment"},
    {fps:15,qrbox:250},
    onScanSuccess
  );

  scannerStarted=true;
  scanCooldown=false;
}

async function onScanSuccess(text){

  if(scanCooldown) return;

  scanCooldown=true;

  if(navigator.vibrate) navigator.vibrate(80);

  await scanner.pause(true);

  callAPI(text);

}

// ================= MANUAL =================
function openManual(){

  warmup("checkin");

  currentMode="manual";

  hideAll();

  document.getElementById("manualPage").style.display="block";

  document.getElementById("idInput").value="";
  document.getElementById("idInput").focus();

}

function manualCheck(){

  const id=document.getElementById("idInput").value.trim();
  if(!id) return;

  callAPI(id);

}

// ================= RESULT =================
function handleResult(data){

  hideAll();

  const page=document.getElementById("resultPage");
  page.style.display="block";

  let html="";

  if(data.type==="success"){

    page.className="success";

    html=`
      <div style="font-size:70px;color:green;font-weight:bold;">
        ${data.chineseName}
      </div>
      <div style="font-size:40px;">
        ${data.englishName}
      </div>
      <br>
      <div style="font-size:30px;">Checked In</div>
      <div style="font-size:26px;">${data.time}</div>
    `;

    beep.currentTime=0;
    beep.play();

    db.ref("count").transaction(v=>(v||0)+1);

  }else if(data.type==="duplicate"){

    page.className="duplicate";

    html=`
      <div style="font-size:50px;color:orange;">
        Already Checked In
      </div>
      <br>
      <div style="font-size:60px;">
        ${data.chineseName}
      </div>
      <div style="font-size:40px;">
        ${data.englishName}
      </div>
      <br>
      <div style="font-size:28px;">
        ${data.time}
      </div>
    `;

  }else{

    page.className="error";

    html=<div style="font-size:40px;color:red;">${data.message}</div>;

  }

  document.getElementById("resultContent").innerHTML=html;

}

// ================= NAV =================
function goHome(){

  hideAll();
  document.getElementById("home").style.display="block";

}

function nextAction(){

  if(currentMode==="scan"){
    openScan();
  }else{
    openManual();
  }

}

function showLoading(){

  hideAll();

  document.getElementById("resultPage").style.display="block";

  document.getElementById("resultContent").innerHTML=
    "<div style='font-size:40px;'>⏳ Checking...</div>";

}

// ================= HIDE ALL =================
function hideAll(){

  document.getElementById("loginPage").style.display="none";
  document.getElementById("home").style.display="none";
  document.getElementById("scanPage").style.display="none";
  document.getElementById("manualPage").style.display="none";
  document.getElementById("resultPage").style.display="none";

}

</script>

</body>
</html>
